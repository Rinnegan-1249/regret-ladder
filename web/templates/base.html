<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Regret Ladder{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css?v={{ v }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
        media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"></noscript>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>
<nav>
  <div class="brand">Regret <span>Ladder</span></div>
  <a href="/" class="{{ 'active' if page == 'home' else '' }}">Home</a>
  <a href="/games" class="{{ 'active' if page == 'games' else '' }}">Games</a>
  <a href="/foundations" class="{{ 'active' if page == 'foundations' else '' }}">Foundations</a>
  <a href="/regret" class="{{ 'active' if page == 'regret' else '' }}">Regret</a>
  <a href="/results" class="{{ 'active' if page == 'results' else '' }}">Results</a>
  <a href="/references" class="{{ 'active' if page == 'references' else '' }}">References</a>
</nav>
<main>
{% block content %}{% endblock %}
</main>
<footer>
  Regret Ladder — a summer research project on regret minimization in games.
  All bots and live-training graphs are computed by the project's actual validated solvers.
</footer>
<script src="/static/js/common.js?v={{ v }}"></script>
{% block scripts %}{% endblock %}
<script>
document.addEventListener("DOMContentLoaded", () => {
  if (window.renderMathInElement) {
    renderMathInElement(document.body, {
      delimiters: [
        {left: "$$", right: "$$", display: true},
        {left: "\\(", right: "\\)", display: false}
      ]
    });
  }
});
</script>
</body>
</html>
